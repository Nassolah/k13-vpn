<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K13 VPN</title>
    <script src="https://telegram.org"></script>
    <style>
        :root { --bg: #071408; --card: #121512; --sheet: #0d0f0d; --neon: #26d017; --accent: #39ff14; --text-muted: #8a998b; }
        body { margin: 0; padding: 0; width: 100vw; height: 100vh; background: var(--bg); color: #ffffff; font-family: -apple-system, sans-serif; overflow-x: hidden; }
        .page { display: none; width: 100%; min-height: 100vh; box-sizing: border-box; padding: 16px; padding-bottom: 30px; }
        .page.active { display: flex; flex-direction: column; }
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .btn-circle { width: 40px; height: 40px; background: var(--card); border: 1px solid rgba(255,255,255,0.05); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; cursor: pointer; text-decoration: none; }
        .logo-container { margin: 20px 0; text-align: center; flex: 1; display: flex; align-items: center; justify-content: center; }
        .logo-container img { width: 130px; height: 130px; border-radius: 50%; box-shadow: 0 0 25px rgba(38,208,23,0.4); }
        .bottom-sheet { background: var(--sheet); width: 100%; min-height: 50vh; border-radius: 32px 32px 0 0; padding: 24px 16px; box-sizing: border-box; display: flex; flex-direction: column; gap: 16px; margin-top: auto; }
        .tariff-row { display: flex; gap: 12px; width: 100%; }
        .card { flex: 1; background: var(--card); padding: 14px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); position: relative; }
        .card-title { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        .card-value { font-size: 15px; font-weight: bold; }
        .badge { position: absolute; top: -10px; left: 12px; background: #e0aa3e; color: #000; font-size: 10px; font-weight: bold; padding: 2px 8px; border-radius: 20px; }
        .btn-primary { background: var(--neon); color: #ffffff; border: none; padding: 16px; border-radius: 14px; font-size: 16px; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 0 15px rgba(38,208,23,0.3); }
        .btn-secondary { background: transparent; color: #ffffff; border: 1px solid #1b4d1d; padding: 14px; border-radius: 14px; font-size: 15px; text-align: left; display: flex; justify-content: space-between; align-items: center; cursor: pointer; text-decoration: none; }
        .accent-text { color: var(--accent); }
        .text-muted { color: var(--text-muted); font-size: 13px; }
        .profile-sec { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
        .p-avatar { width: 50px; height: 50px; background: var(--card); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 24px; color: var(--accent); }
        .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
        input { background: var(--card); border: 1px solid rgba(255,255,255,0.08); padding: 14px; border-radius: 12px; color: #fff; font-size: 15px; width: 100%; box-sizing: border-box; }
        .btn-submit { background: var(--neon); color: #fff; border: none; padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .alert-box { background: rgba(224,170,62,0.1); border: 1px solid rgba(224,170,62,0.3); pading: 12px; border-radius: 12px; font-size: 13px; color: #e0aa3e; line-height: 1.4; padding: 12px; }
        .lang-toggle { display: flex; gap: 10px; margin-top: 10px; }
        .btn-lang { flex: 1; padding: 12px; background: transparent; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; cursor: pointer; font-size: 14px; }
        .btn-lang.active { border-color: var(--accent); background: rgba(57,255,20,0.05); color: var(--accent); }
        .stat-grid { display: flex; gap: 10px; margin-bottom: 16px; }
        .stat-box { flex: 1; background: var(--card); border-radius: 14px; padding: 12px; text-align: center; border: 1px solid rgba(255,255,255,0.03); }
        .stat-num { font-size: 18px; font-weight: bold; margin-bottom: 4px; }
        .stat-label { font-size: 11px; color: var(--text-muted); }
        .copy-input { position: relative; display: flex; align-items: center; }
        .btn-copy { position: absolute; right: 12px; background: none; border: none; color: var(--accent); cursor: pointer; font-size: 14px; }
        .progress-steps { display: flex; justify-content: center; align-items: center; gap: 20px; margin: 15px 0 25px 0; position: relative; }
        .step-circle { width: 32px; height: 32px; background: var(--card); border: 2px solid rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; position: relative; z-index: 2; }
        .step-circle.active { background: var(--neon); border-color: var(--neon); color: #fff; box-shadow: 0 0 10px var(--neon); }
        .step-circle.done { background: var(--accent); border-color: var(--accent); color: #000; }
        .platform-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .platform-card { background: var(--card); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 16px 8px; text-align: center; cursor: pointer; position: relative; }
        .platform-card.active { border-color: var(--accent); background: rgba(57,255,20,0.05); }
        .platform-card .icon { font-size: 28px; margin-bottom: 8px; display: block; }
        .platform-card span { font-size: 13px; font-weight: 500; }
        .p-badge { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: #e0aa3e; color: #000; font-size: 9px; font-weight: bold; padding: 2px 6px; border-radius: 10px; white-space: nowrap; }
        .sub-list { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .sub-item { background: var(--card); padding: 14px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .sub-item.active { border-color: var(--accent); background: rgba(57,255,20,0.05); }
        .faq-item { background: var(--card); border-radius: 14px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 10px; overflow: hidden; }
        .faq-trigger { padding: 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-size: 14px; font-weight: 500; }
        .faq-content { padding: 0 16px; max-height: 0; overflow: hidden; transition: max-height 0.2s ease, padding 0.2s ease; color: var(--text-muted); font-size: 13px; line-height: 1.5; }
        .faq-item.open .faq-content { padding: 0 16px 16px 16px; max-height: 200px; }
        .faq-item.open .faq-arrow { transform: rotate(180deg); color: var(--accent); }
        .faq-arrow { transition: transform 0.2s; color: var(--text-muted); }
    </style>
</head>
